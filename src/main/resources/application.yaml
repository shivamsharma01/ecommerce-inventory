server:
  port: ${SERVER_PORT:8086}

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /
      path-mapping:
        health: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

spring:
  application:
    name: inventory
  cloud:
    gcp:
      project-id: ${SPRING_CLOUD_GCP_PROJECT_ID:}
      credentials:
        location: ${GCP_CREDENTIALS_PATH:}
      pubsub:
        enabled: ${SPRING_CLOUD_GCP_PUBSUB_ENABLED:false}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8081}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/inventory}
    username: ${SPRING_DATASOURCE_USERNAME:inventory_user}
    password: ${SPRING_DATASOURCE_PASSWORD:inventory_password}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: none

inventory:
  pubsub:
    enabled: ${INVENTORY_PUBSUB_ENABLED:false}
    subscription: ${INVENTORY_PUBSUB_SUBSCRIPTION:inventory-product-events-sub}
  product:
    base-url: ${INVENTORY_PRODUCT_BASE_URL:http://localhost:8084}

