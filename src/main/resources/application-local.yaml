spring:
  cloud:
    gcp:
      project-id: "${MCART_GCP_PROJECT_ID:${SPRING_CLOUD_GCP_PROJECT_ID:my-project-chat-ai-487408}}"
      credentials:
        location: ${GCP_CREDENTIALS_PATH:}
      pubsub:
        enabled: ${SPRING_CLOUD_GCP_PUBSUB_ENABLED:true}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8081}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/inventory}
    username: ${SPRING_DATASOURCE_USERNAME:inventory_user}
    password: ${SPRING_DATASOURCE_PASSWORD:inventory_password}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: none

inventory:
  pubsub:
    enabled: ${INVENTORY_PUBSUB_ENABLED:true}
    subscription: ${INVENTORY_PUBSUB_SUBSCRIPTION:inventory-product-events-sub}
  product:
    base-url: ${INVENTORY_PRODUCT_BASE_URL:http://localhost:8084}

